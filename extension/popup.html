<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>PrepOps</title>
    <style>
      body { font-family: Arial, sans-serif; width: 300px; padding: 12px; background: #09090b; color: #f4f4f5; }
      input { width: 100%; box-sizing: border-box; margin-bottom: 10px; border: 1px solid #3f3f46; border-radius: 8px; padding: 8px; background: #18181b; color: #f4f4f5; }
      button { width: 100%; border: 0; border-radius: 8px; padding: 10px; background: #6366f1; color: white; cursor: pointer; }
      p { font-size: 12px; color: #a1a1aa; }
    </style>
  </head>
  <body>
    <input id="companyName" placeholder="Company name" />
    <button id="save">Save To PrepOps</button>
    <p id="status">Waiting...</p>
    <script src="popup.js"></script>
  </body>
</html>
