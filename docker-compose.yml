services:
  prepops:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: prepops
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=file:/app/prisma/dev.db
      - AI_ENABLED=${AI_ENABLED:-false}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    volumes:
      - prepops-db:/app/prisma
      - prepops-storage:/app/storage
    restart: unless-stopped

volumes:
  prepops-db:
  prepops-storage:
