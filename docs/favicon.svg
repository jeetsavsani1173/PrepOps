<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Rounded square base (Dark mode dashboard color) -->
  <rect width="64" height="64" rx="16" fill="#09090b" stroke="rgba(255,255,255,0.08)" stroke-width="2"/>
  <!-- Glowing subtle border inside -->
  <rect x="2" y="2" width="60" height="60" rx="14" fill="none" stroke="url(#border-grad)" stroke-width="1.5"/>
  <!-- Terminal Prompt >_ in glowing neon green -->
  <path d="M18 20L28 26L18 32" stroke="#10b981" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="32" y1="32" x2="44" y2="32" stroke="#3b82f6" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Success Radar Pulse in top right -->
  <circle cx="48" cy="16" r="3" fill="#10b981"/>
  <circle cx="48" cy="16" r="6" fill="none" stroke="#10b981" stroke-width="1" stroke-opacity="0.5"/>
  
  <defs>
    <linearGradient id="border-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#3b82f6" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#c084fc" stop-opacity="0.8"/>
    </linearGradient>
  </defs>
</svg>
